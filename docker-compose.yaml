version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ${DB_HOST:-db}
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-app}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 3s
      timeout: 3s
      retries: 5

  backend:
    image: backend
    container_name: backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=${DB_CONNECTION_STRING:-Host=db;Database=app;Username=postgres;Password=postgres}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./.env:/app/.env:ro
      - static:/app/wwwroot

  # Сервис для разработки фронтенда
  frontend_dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend_dev
    ports:
      - "5173:5173"  # Прямой доступ для отладки (опционально)
    volumes:
      - ./frontend:/app  # Монтируем исходники для hot-reload
      - /app/node_modules  # Изолируем node_modules
    environment:
      - NODE_ENV=development
      - VITE_API_URL=/api  # Для Vite
    restart: unless-stopped
    depends_on:
      - backend

  # Nginx прокси
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: nginx_proxy
    ports:
      - "80:80"  # Основной вход
    depends_on:
      - frontend_dev
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  static: